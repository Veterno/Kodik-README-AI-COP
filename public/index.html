<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodik README AI - Web Interface</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css" id="hljs-style">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-5 min-vh-100 d-flex flex-column justify-content-center">
        <header class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 class="display-4">📝 Kodik README AI</h1>
                <p class="lead" data-i18n="lead">Automatically generate README.md for your project</p>
            </div>
            <div class="d-flex gap-3">
                <button class="btn btn-outline-secondary border-0" id="langToggle">RU</button>
                <button class="btn btn-outline-secondary border-0" id="themeToggle">
                    <span id="themeIcon">🌙</span>
                </button>
            </div>
        </header>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <form id="generateForm">
                            <div class="mb-3">
                                <label class="form-label" data-i18n="projectSource">Project Source</label>
                                <ul class="nav nav-tabs" id="sourceTabs" role="tablist">
                                    <li class="nav-item" role="presentation">
                                        <button class="nav-link active" id="github-tab" data-bs-toggle="tab" data-bs-target="#github-panel" type="button" role="tab">GitHub URL</button>
                                    </li>
                                    <li class="nav-item" role="presentation">
                                        <button class="nav-link" id="zip-tab" data-bs-toggle="tab" data-bs-target="#zip-panel" type="button" role="tab" data-i18n="zipArchive">ZIP Archive</button>
                                    </li>
                                </ul>
                                <div class="tab-content" id="sourceTabsContent">
                                    <div class="tab-pane fade show active" id="github-panel" role="tabpanel">
                                        <input type="url" class="form-control" id="githubUrl" name="githubUrl" placeholder="https://github.com/user/repo">
                                    </div>
                                    <div class="tab-pane fade" id="zip-panel" role="tabpanel">
                                        <input type="file" class="form-control" id="zipFile" name="zipFile" accept=".zip,.tar.gz">
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="language" class="form-label" data-i18n="genLang">Generation Language</label>
                                    <select class="form-select" id="language" name="language">
                                        <option value="en" data-i18n="langEn">English</option>
                                        <option value="ru" data-i18n="langRu">Russian</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="tone" class="form-label" data-i18n="descTone">Description Tone</label>
                                    <select class="form-select" id="tone" name="tone">
                                        <option value="technical" data-i18n="toneTechnical">Technical</option>
                                        <option value="marketing" data-i18n="toneMarketing">Marketing</option>
                                        <option value="minimal" data-i18n="toneMinimal">Minimalist</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="useAi" name="useAi" checked>
                                <label class="form-check-label" for="useAi" data-i18n="useAi">
                                    Use AI (OpenAI-compatible API)
                                </label>
                            </div>

                            <div id="aiOptions" class="mb-3">
                                <label for="apiKey" class="form-label" data-i18n="apiKeyLabel">API Key (optional if set in .env)</label>
                                <input type="password" class="form-control" id="apiKey" name="apiKey" placeholder="sk-...">
                            </div>

                            <button type="submit" class="btn btn-primary w-100" id="submitBtn" data-i18n="generateBtn">Generate README</button>
                        </form>
                    </div>
                </div>

                <div id="progressContainer" class="d-none">
                    <div class="card shadow-sm mb-4">
                        <div class="card-body">
                            <h5 class="card-title" data-i18n="progressTitle">Generation Progress</h5>
                            <div class="progress mb-3">
                                <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                            </div>
                            <p id="statusMessage" class="text-muted small">Initializing...</p>
                        </div>
                    </div>
                </div>

                <div id="resultContainer" class="d-none">
                    <div class="card shadow-sm">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0" data-i18n="resultTitle">Result: README.md</h5>
                            <div>
                                <button class="btn btn-sm btn-outline-secondary" id="copyBtn" data-i18n="copyBtn">Copy</button>
                                <button class="btn btn-sm btn-success" id="downloadBtn" data-i18n="downloadBtn">Download</button>
                            </div>
                        </div>
                        <div class="card-body p-0">
                            <pre id="markdownOutput"><code class="language-markdown"></code></pre>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="client.js"></script>
</body>
</html>
