name: Weekly Benchmark

on:
  schedule:
    - cron: '0 0 * * 1' # Каждый понедельник в полночь
  workflow_dispatch:
    inputs:
      models:
        description: 'Список моделей через запятую'
        required: true
        default: 'gpt-4o-mini,gpt-4o'
      concurrency:
        description: 'Параллелизм'
        required: false
        default: '3'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Benchmark
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          USE_AI: true
        run: |
          npm run benchmark -- \
            --models "${{ github.event.inputs.models || 'gpt-4o-mini' }}" \
            --concurrency ${{ github.event.inputs.concurrency || 3 }}

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results/

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: benchmark-results
          publish_branch: gh-pages
